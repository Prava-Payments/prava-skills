interface:
  display_name: "Swiggy Prava Checkout"
  short_description: "Order Swiggy via MCP and Prava card tokens"
  default_prompt: "Use $swiggy-prava-skill to find a Swiggy item, confirm the cart, authorize Prava, and complete checkout."
dependencies:
  tools:
    - type: "mcp"
      value: "swiggy-food"
      description: "Swiggy Food MCP server for addresses, restaurant/menu search, and cart operations."
      transport: "streamable_http"
      url: "https://mcp.swiggy.com/food"
    - type: "mcp"
      value: "swiggy-instamart"
      description: "Swiggy Instamart MCP server for grocery and quick-commerce flows."
      transport: "streamable_http"
      url: "https://mcp.swiggy.com/im"
    - type: "mcp"
      value: "swiggy-dineout"
      description: "Swiggy Dineout MCP server for restaurant booking flows."
      transport: "streamable_http"
      url: "https://mcp.swiggy.com/dineout"
