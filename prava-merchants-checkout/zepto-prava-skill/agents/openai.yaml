interface:
  display_name: "Zepto Prava Checkout"
  short_description: "Order Zepto via MCP and Prava card tokens"
  default_prompt: "Use $zepto-prava-skill to order Zepto items through the fastest existing path: reuse configured Zepto MCP/auth and active Prava when available, select any saved address label named by the user, preview the final Zepto total, tell the user to tap Approve on the Prava page, then pay the Zepto payment link."
dependencies:
  tools:
    - type: "mcp"
      value: "zepto"
      description: "Zepto MCP server via mcp-remote for addresses, product search, cart operations, online-payment order creation, and payment status."
      transport: "stdio"
      url: "https://mcp.zepto.co.in/mcp"
